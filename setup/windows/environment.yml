# Conda environment specification for Unsloth Qwen3 GRPO training on Windows
# Isolated from any existing Python/PyTorch environments.
#
# Usage:
#   conda env create -f setup/windows/environment.yml
#   conda activate unsloth-qwen3-grpo
#
# CUDA 12.4 + PyTorch 2.5.x (recommended for Qwen3 GRPO on Windows)
# Adjust the pytorch-cuda version to match your installed CUDA Driver:
#   CUDA 11.8  -->  pytorch-cuda=11.8
#   CUDA 12.1  -->  pytorch-cuda=12.1
#   CUDA 12.4  -->  pytorch-cuda=12.4  (default)

name: unsloth-qwen3-grpo

channels:
  - pytorch         # official PyTorch channel
  - nvidia          # CUDA runtime wheels
  - conda-forge     # general packages
  - defaults

dependencies:
  # ── Python ──────────────────────────────────────────────────────────────────
  - python=3.11      # 3.11 gives best Windows compat; unsloth supports 3.9-3.14

  # ── PyTorch stack (CUDA 12.4) ────────────────────────────────────────────────
  - pytorch>=2.5.0
  - torchvision
  - torchaudio
  - pytorch-cuda=12.4

  # ── Core build tools ─────────────────────────────────────────────────────────
  - pip
  - wheel
  - setuptools>=80.0

  # ── pip-installed packages ────────────────────────────────────────────────────
  - pip:
    # HuggingFace ecosystem
    - "transformers>=4.51.3,!=4.52.0,!=4.52.1,!=4.52.2,!=4.52.3,<5.3.0"
    - "accelerate>=0.34.1"
    - "peft>=0.18.0,!=0.11.0"
    - "trl>=0.18.2,!=0.19.0,<=0.24.0"
    - "datasets>=3.4.1,!=4.0.*,!=4.1.0,<4.4.0"
    - "huggingface_hub>=0.34.0"
    - "hf_transfer"
    - "diffusers"
    - "sentence-transformers"
    - "tokenizers"
    - "safetensors"
    - "sentencepiece>=0.2.0"

    # bitsandbytes for Windows (4-bit/8-bit quantization)
    - "bitsandbytes>=0.45.5,!=0.46.0,!=0.48.0"

    # Triton for Windows (replaces Linux triton)
    - "triton-windows"

    # xformers for Windows attention (Flash Attention not available natively)
    - "xformers>=0.0.28"

    # Unsloth core + zoo (install from source — see install.ps1)
    - "unsloth_zoo>=2026.3.2"

    # Utilities
    - "numpy"
    - "tqdm"
    - "psutil"
    - "packaging"
    - "protobuf"
    - "tyro"
    - "pyyaml"
    - "pydantic"
    - "nest-asyncio"

    # Logging & monitoring
    - "wandb"
    - "tensorboard"

    # Math reward verification
    - "sympy"
    - "antlr4-python3-runtime==4.11"

    # Dev / quality
    - "ruff"
    - "pytest"
    - "ipykernel"
    - "ipywidgets"
    - "jupyter"
